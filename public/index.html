<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amigo de Estudo</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]']]
        },
        startup: {
          typeset: false
        }
      };
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');

      :root {
        --bg-color: #f8fafc;
        --text-main: #334155;
        --primary: #8b5cf6;
        --primary-shadow: #7c3aed;
        --secondary: #f97316;
        --secondary-shadow: #ea580c;
        --gray: #e2e8f0;
        --gray-shadow: #cbd5e1;
        --dark-gray: #94a3b8;
        --error: #ef4444;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: 'Nunito', sans-serif;
        background: var(--bg-color);
        color: var(--text-main);
        display: flex;
        justify-content: center;
        min-height: 100vh;
      }

      .app-container {
        width: 100%;
        max-width: 480px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 20px;
        position: relative;
      }

      h1, h2, h3 { margin-top: 0; }

      .hidden { display: none !important; }

      /* Inputs and Textareas */
      input, textarea {
        width: 100%;
        font-family: 'Nunito', sans-serif;
        font-size: 16px;
        padding: 14px;
        border: 2px solid var(--gray);
        border-radius: 12px;
        background: #ffffff;
        color: var(--text-main);
        margin-bottom: 16px;
        outline: none;
        transition: border 0.2s;
        box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
      }
      input:focus, textarea:focus { border-color: var(--secondary); }
      label { font-weight: 700; font-size: 18px; display: block; margin-bottom: 8px; color: #475569; }

      /* Duolingo style buttons */
      .btn {
        width: 100%;
        font-family: 'Nunito', sans-serif;
        font-weight: 800;
        font-size: 16px;
        text-transform: uppercase;
        letter-spacing: 0.8px;
        padding: 14px;
        border-radius: 16px;
        border: none;
        cursor: pointer;
        position: relative;
        transition: transform 0.1s, margin-top 0.1s, padding-bottom 0.1s;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 16px;
        user-select: none;
      }

      .btn:active {
        transform: translateY(4px);
        margin-bottom: 12px;
      }

      .btn-primary {
        background-color: var(--primary);
        color: white;
        border-bottom: 4px solid var(--primary-shadow);
      }
      .btn-primary:active { border-bottom-width: 0px; margin-top: 4px; }

      .btn-secondary {
        background-color: var(--secondary);
        color: white;
        border-bottom: 4px solid var(--secondary-shadow);
      }
      .btn-secondary:active { border-bottom-width: 0px; margin-top: 4px; }

      .btn-outline {
        background-color: transparent;
        color: var(--text-main);
        border: 2px solid var(--gray);
        border-bottom: 4px solid var(--gray);
      }
      .btn-outline:active { border-bottom-width: 2px; margin-top: 2px; }

      /* Screens */
      .screen {
        flex: 1;
        display: flex;
        flex-direction: column;
        animation: fadeIn 0.4s ease;
      }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

      /* Path / Journey Screen */
      .journey-header {
        text-align: center;
        padding: 10px 0 30px 0;
        border-bottom: 2px dashed var(--gray);
        margin-bottom: 30px;
      }

      .journey-header h2 { font-size: 24px; font-weight: 800; color: var(--secondary); margin-bottom: 5px; }
      .journey-header p { font-size: 14px; color: var(--dark-gray); margin: 0; font-weight: 700; }

      .path-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        padding-bottom: 100px;
      }

      .task-node {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 28px;
        font-weight: 900;
        color: white;
        cursor: pointer;
        position: relative;
        z-index: 2;
        transition: transform 0.2s;
      }

      .task-node:hover { transform: scale(1.05); }

      .task-node.locked {
        background: var(--gray);
        border-bottom: 6px solid var(--gray-shadow);
        color: #ffffff;
        cursor: not-allowed;
      }

      .task-node.active {
        background: var(--secondary);
        border-bottom: 6px solid var(--secondary-shadow);
        animation: bounce 2s infinite;
      }
      @keyframes bounce {
        0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-10px); }
        60% { transform: translateY(-5px); }
      }

      .task-node.done {
        background: #2ea043; /* Green */
        border-bottom: 6px solid #238636;
      }

      .task-label {
        margin-top: 10px;
        margin-bottom: 10px;
        font-size: 14px;
        font-weight: 800;
        text-align: center;
        width: 250px;
        color: #64748b;
        z-index: 2;
      }

      .path-line {
        width: 4px;
        height: 40px;
        background: var(--gray);
        z-index: 1;
      }

      /* Lesson Screen */
      .lesson-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .progress-bar-container {
        flex: 1;
        height: 16px;
        background: var(--gray);
        border-radius: 10px;
        margin: 0 16px;
        overflow: hidden;
      }
      .progress-bar {
        height: 100%;
        background: var(--primary);
        width: 0%;
        transition: width 0.4s ease;
      }
      .close-lesson {
        font-size: 24px;
        color: var(--dark-gray);
        cursor: pointer;
        font-weight: bold;
      }

      .lesson-card {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .lesson-character {
        font-size: 60px;
        text-align: center;
        margin-bottom: 10px;
      }

      .lesson-bubble {
        background: #ffffff;
        border: 2px solid var(--gray);
        border-radius: 16px;
        padding: 24px;
        font-size: 18px;
        line-height: 1.5;
        font-weight: 700;
        position: relative;
        margin-bottom: 30px;
        box-shadow: 0 4px 0 var(--gray);
        color: var(--text-main);
      }

      .lesson-bubble::before {
        content: '';
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        border-width: 0 10px 10px 10px;
        border-style: solid;
        border-color: transparent transparent var(--gray) transparent;
      }
      .lesson-bubble::after {
        content: '';
        position: absolute;
        top: -7px;
        left: 50%;
        transform: translateX(-50%);
        border-width: 0 8px 8px 8px;
        border-style: solid;
        border-color: transparent transparent #ffffff transparent;
      }

      .lesson-badge {
        display: inline-block;
        background: var(--secondary);
        color: white;
        padding: 4px 10px;
        border-radius: 8px;
        font-size: 12px;
        text-transform: uppercase;
        font-weight: 900;
        margin-bottom: 12px;
      }

      .bottom-bar {
        margin-top: auto;
        padding-top: 20px;
        border-top: 2px solid var(--gray);
      }

      .error-msg {
        color: var(--error);
        font-weight: bold;
        text-align: center;
        margin-bottom: 10px;
      }

      .row { display: flex; gap: 10px; }
      .col { flex: 1; }


      .markdown-body {
        font-family: inherit;
        line-height: 1.6;
        color: #333;
      }
      .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4 {
        margin-top: 1em;
        margin-bottom: 0.5em;
        color: #222;
      }
      .markdown-body p {
        margin-bottom: 1em;
      }
      .markdown-body ul, .markdown-body ol {
        margin-bottom: 1em;
        padding-left: 1.5em;
      }
      .markdown-body li {
        margin-bottom: 0.5em;
      }
      .markdown-body strong {
        font-weight: 600;
        color: #000;
      }

      .markdown-body img {
        max-width: 100%;
        height: auto;
        border-radius: 12px;
        margin: 16px 0;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        display: block;
      }
    </style>


  </head>
  <body>
    <div class="app-container">

      <!-- ONBOARDING SCREENS -->
      <div id="screen-onboarding" class="screen">
        <div style="text-align: center; margin-top: 40px; margin-bottom: 40px;">
          <div style="font-size: 80px; margin-bottom: 10px;">🤖</div>
          <h1 style="color: var(--primary); font-size: 32px; font-weight: 900;">Amigo de Estudo</h1>
          <p style="color: var(--dark-gray); font-weight: 700; font-size: 18px;">Aprenda no seu ritmo.</p>
        </div>

        <div id="onb-step-1">
          <label>Qual o seu objetivo principal?</label>
          <input id="in-objetivo" type="text" placeholder="Ex: Enem, Prova de Matemática..." />
          <p id="err-onb-1" class="error-msg"></p>
          <div class="bottom-bar">
            <button id="btn-next-1" class="btn btn-primary">Continuar</button>
          </div>
        </div>

        <div id="onb-step-2-escola" class="hidden">
          <label>Quais assuntos vão cair na prova?</label>
          <textarea id="in-assuntos" rows="3" placeholder="Ex: Frações, interpretação de texto..."></textarea>
          <p id="err-onb-escola" class="error-msg"></p>
          <div class="bottom-bar">
            <button id="btn-next-escola" class="btn btn-primary">Gerar Trilha</button>
            <button id="btn-generic-escola" class="btn btn-outline">Testar Trilha Genérica</button>
          </div>
        </div>

        <div id="onb-step-2-concurso" class="hidden">
          <label>Você tem o conteúdo do edital?</label>
          <p id="err-onb-conc-1" class="error-msg"></p>
          <div class="bottom-bar">
            <button id="btn-edital-sim" class="btn btn-primary">Sim, eu tenho</button>
            <button id="btn-edital-nao" class="btn btn-outline">Não tenho</button>
          </div>
        </div>

        <div id="onb-step-3-concurso" class="hidden">
          <label>Cole aqui as matérias principais:</label>
          <textarea id="in-materias" rows="3" placeholder="Ex: Português, Direito Administrativo..."></textarea>
          <p id="err-onb-conc-2" class="error-msg"></p>
          <div class="bottom-bar">
            <button id="btn-next-concurso" class="btn btn-primary">Gerar Trilha</button>
          </div>
        </div>

        <!-- Loading State -->
        <div id="onb-loading" class="hidden" style="text-align: center; margin-top: 50px;">
          <div style="font-size: 50px; animation: bounce 1s infinite;">🧠</div>
          <h2 style="margin-top: 20px; color: var(--secondary);">Montando sua trilha...</h2>
        </div>
      </div>

      <!-- JOURNEY / PATH SCREEN -->
      <div id="screen-journey" class="screen hidden">
        <div class="journey-header">
          <h2 id="journey-title">Sua Trilha Diária</h2>
          <p id="journey-msg">Complete os desafios na ordem.</p>
        </div>

        <div id="path-container" class="path-container">
          <!-- Nodes will be injected here -->
        </div>
      </div>

      <!-- LESSON SCREEN -->
      <div id="screen-lesson" class="screen hidden">
        <div class="lesson-header">
          <div id="btn-close-lesson" class="close-lesson">✕</div>
          <div class="progress-bar-container">
            <div id="lesson-progress" class="progress-bar"></div>
          </div>
        </div>

        <div class="lesson-card">
          <div class="lesson-character">🤖</div>
          <div class="lesson-bubble">
            <div id="lesson-badge" class="lesson-badge">Explicação</div>
            <div id="lesson-content">
              <!-- Content injected here -->
            </div>
          </div>
          <div id="lesson-interactive-area" class="hidden">
            <textarea id="lesson-answer" rows="3" placeholder="Sua resposta..."></textarea>
          </div>
        </div>

        <p id="err-lesson" class="error-msg"></p>
        <div class="bottom-bar">
          <button id="btn-lesson-action" class="btn btn-primary">Continuar</button>
        </div>
      </div>

    </div>

    <script>
      // State Management
      const state = {
        userId: localStorage.getItem('amigo_user_id') || `u-${Date.now()}`,
        objetivo: '',
        tipo: 'escola',
        tarefas: [],
        lessonActive: null, // task object
        lessonStep: 0,      // 0: Explicacao, 1: Exemplo, 2: Exercicio 1, 3: Exercicio 2
      };
      localStorage.setItem('amigo_user_id', state.userId);

      // Utility Functions
      const $ = (id) => document.getElementById(id);
      const hideAllScreens = () => document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
      const hideAllOnbSteps = () => document.querySelectorAll('[id^="onb-step"]').forEach(el => el.classList.add('hidden'));

      async function post(url, payload) {
        const res = await fetch(url, { method: 'POST', headers: { 'content-type':'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.erro || 'Erro no servidor');
        return data;
      }

      // ----------------------------------------------------------------------
      // ONBOARDING LOGIC
      // ----------------------------------------------------------------------
      $('btn-next-1').onclick = async () => {
        $('err-onb-1').textContent = '';
        state.objetivo = $('in-objetivo').value.trim();
        if (!state.objetivo) return $('err-onb-1').textContent = 'Digite o que você quer estudar!';

        try {
          const btn = $('btn-next-1');
          btn.textContent = '...'; btn.disabled = true;
          const data = await post('/api/onboarding/detectar-tipo', { objetivo: state.objetivo });
          state.tipo = data.tipo;

          hideAllOnbSteps();
          if (state.tipo === 'concurso') $('onb-step-2-concurso').classList.remove('hidden');
          else $('onb-step-2-escola').classList.remove('hidden');

        } catch(e) { $('err-onb-1').textContent = e.message; }
        finally { $('btn-next-1').textContent = 'Continuar'; $('btn-next-1').disabled = false; }
      };

      // Concurso flow
      $('btn-edital-sim').onclick = () => {
        hideAllOnbSteps();
        $('onb-step-3-concurso').classList.remove('hidden');
      };
      $('btn-edital-nao').onclick = () => finalizarOnboarding({ aceitarGenerico: true, conteudo: '', temConteudo: 'nao' });
      $('btn-next-concurso').onclick = () => {
        const mat = $('in-materias').value.trim();
        if(!mat) return $('err-onb-conc-2').textContent = 'Preencha as matérias!';
        finalizarOnboarding({ conteudo: mat, temConteudo: 'sim' });
      };

      // Escola flow
      $('btn-next-escola').onclick = () => {
        const ass = $('in-assuntos').value.trim();
        if(!ass) return $('err-onb-escola').textContent = 'Preencha os assuntos!';
        finalizarOnboarding({ conteudo: ass, aceitarGenerico: false });
      };
      $('btn-generic-escola').onclick = () => finalizarOnboarding({ conteudo: '', aceitarGenerico: true });

      async function finalizarOnboarding(extra) {
        hideAllOnbSteps();
        $('onb-loading').classList.remove('hidden');

        try {
          const data = await post('/api/onboarding/finalizar', {
            userId: state.userId,
            objetivo: state.objetivo,
            tipo: state.tipo,
            ...extra
          });
          state.tarefas = data.tarefas;
          $('journey-msg').textContent = data.mensagem;
          buildJourney();
          hideAllScreens();
          $('screen-journey').classList.remove('hidden');
        } catch(e) {
          $('onb-loading').classList.add('hidden');
          $('onb-step-1').classList.remove('hidden');
          $('err-onb-1').textContent = e.message;
        }
      }

      // ----------------------------------------------------------------------
      // JOURNEY (PATH) LOGIC
      // ----------------------------------------------------------------------
      function buildJourney() {
        const container = $('path-container');
        container.innerHTML = '';

        let firstPendingFound = false;

        state.tarefas.forEach((task, idx) => {
          const isDone = task.status === 'concluida';
          let nodeClass = 'locked';
          let icon = '🔒';

          if (isDone) {
            nodeClass = 'done';
            icon = '⭐';
          } else if (!firstPendingFound) {
            nodeClass = 'active';
            icon = '▶';
            firstPendingFound = true;
          }

          const wrapper = document.createElement('div');
          wrapper.style.display = 'flex';
          wrapper.style.flexDirection = 'column';
          wrapper.style.alignItems = 'center';

          const node = document.createElement('div');
          node.className = `task-node ${nodeClass}`;
          node.textContent = icon;

          if (nodeClass === 'active') {
            node.onclick = () => startLesson(task);
          }

          wrapper.appendChild(node);

          const label = document.createElement('div');
          label.className = 'task-label';

          let title = task.materia;
          let sub = task.descricao || task.tema;

          // Adiciona indicação clara de que é a Teoria ou Prática/Questões para evitar que o nó pareça duplicado
          let tipoStr = task.tipo === 'questoes' ? '(Prática)' : '(Teoria)';

          // Se o nome do tema e da materia sao parecidos/repetidos, mostra so um com enfase
          if (title.toLowerCase() === sub.toLowerCase() || sub.toLowerCase().startsWith(title.toLowerCase())) {
              label.innerHTML = `<span style="font-weight:800; color: #475569;">${sub} <span style="font-size: 12px; color: #94a3b8; font-weight: normal;">${tipoStr}</span></span>`;
          } else {
              label.innerHTML = `${title}<br><span style="font-weight:400; color: #64748b;">${sub} <span style="font-size: 12px; color: #94a3b8;">${tipoStr}</span></span>`;
          }

          wrapper.appendChild(label);

          if (idx < state.tarefas.length - 1) {
            const line = document.createElement('div');
            line.className = 'path-line';
            wrapper.appendChild(line);
          }

          container.appendChild(wrapper);
        });
      }

      // ----------------------------------------------------------------------
      // LESSON (AULA INTERATIVA) LOGIC
      // ----------------------------------------------------------------------
      function startLesson(task) {
        state.lessonActive = task;

        // Se a tarefa for de "questoes", pula a teoria e o exemplo e vai direto para o primeiro exercício (step 2)
        if (task.tipo === 'questoes') {
            state.lessonStep = 2;
        } else {
            // Se for de teoria, começa na explicação (step 0)
            state.lessonStep = 0;
        }

        hideAllScreens();
        $('screen-lesson').classList.remove('hidden');
        renderLessonStep();
      }

      $('btn-close-lesson').onclick = () => {
        if(confirm("Tem certeza que deseja sair? O progresso desta lição será perdido.")) {
          hideAllScreens();
          $('screen-journey').classList.remove('hidden');
        }
      };

      $('btn-lesson-action').onclick = async () => {
        const btn = $('btn-lesson-action');
        $('err-lesson').textContent = '';

        // Validate answer if on an exercise step
        if (state.lessonStep >= 2) {
            const ans = $('lesson-answer').value.trim();
            if(!ans) {
                $('err-lesson').textContent = 'Você precisa escrever uma resposta!';
                return;
            }
        }

        const exerciciosCount = (state.lessonActive.conteudo.exercicios || []).length;
        const actualTotalSteps = 2 + exerciciosCount;

        // Se o tipo é teoria, o fim da lição é no passo 1 (Exemplo)
        // Se o tipo é questoes, o fim da lição é no último exercício
        const isLastStep = state.lessonActive.tipo === 'teoria' ? state.lessonStep >= 1 : state.lessonStep >= actualTotalSteps - 1;

        if (isLastStep) {
          try {
            btn.textContent = 'Concluindo...'; btn.disabled = true;
            const data = await post(`/api/tarefas/${state.userId}/concluir`, { taskId: state.lessonActive.id });
            state.tarefas = data.tarefas;
            $('journey-msg').textContent = data.feedback || 'Muito bem! Lição concluída!';
            buildJourney();
            hideAllScreens();
            $('screen-journey').classList.remove('hidden');
          } catch(e) {
            $('err-lesson').textContent = e.message;
          } finally {
            btn.textContent = 'Continuar'; btn.disabled = false;
          }
        } else {
          // Advance lesson
          state.lessonStep++;
          renderLessonStep();
        }
      };

      function renderLessonStep() {
        const task = state.lessonActive;
        const conteudo = task.conteudo;
        const exercicios = conteudo.exercicios || [];

        const actualTotalSteps = 2 + exercicios.length;

        // Update Progress Bar
        let progPct = 0;
        if (task.tipo === 'teoria') {
            progPct = ((state.lessonStep + 1) / 2) * 100;
        } else {
            // Questoes step goes from 2 to actualTotalSteps - 1
            const exIdx = state.lessonStep - 2;
            progPct = ((exIdx + 1) / exercicios.length) * 100;
        }
        $('lesson-progress').style.width = `${progPct}%`;

        const badge = $('lesson-badge');
        const contentDiv = $('lesson-content');
        const btn = $('btn-lesson-action');

        const interactiveArea = $('lesson-interactive-area');
        const answerInput = $('lesson-answer');

        // Remove qualquer feedback antigo
        const oldFeedback = document.getElementById('lesson-feedback');
        if (oldFeedback) oldFeedback.remove();

        if (state.lessonStep === 0) {
          interactiveArea.classList.add('hidden');
          badge.textContent = 'Conceito Novo';
          contentDiv.innerHTML = `<div id="lesson-text" class="markdown-body">${marked.parse(conteudo.explicacao)}</div>`;
          if (window.MathJax) MathJax.typesetPromise([contentDiv]);
          btn.textContent = 'Entendi';
        }
        else if (state.lessonStep === 1) {
          interactiveArea.classList.add('hidden');
          badge.textContent = 'Exemplo Prático';
          contentDiv.innerHTML = `<div id="lesson-text" class="markdown-body">${marked.parse(conteudo.exemplo)}</div>`;
          if (window.MathJax) MathJax.typesetPromise([contentDiv]);
          btn.textContent = 'Continuar';
        }
        else if (state.lessonStep >= 2 && state.lessonStep < 2 + exercicios.length) {
          const exIdx = state.lessonStep - 2;
          interactiveArea.classList.remove('hidden');
          answerInput.value = ''; // Limpa resposta

          badge.textContent = `Exercício ${exIdx + 1} de ${exercicios.length}`;

          // Tratando quebra de linha do banco para a div principal com estilos legíveis
          contentDiv.innerHTML = `<div id="lesson-text" class="markdown-body">${marked.parse(exercicios[exIdx])}</div>`;
          if (window.MathJax) MathJax.typesetPromise([contentDiv]);

          // No tipo "questões", a lição acaba no último exercício
          const isLastEx = state.lessonStep === actualTotalSteps - 1;
          if (isLastEx) {
            btn.textContent = 'Verificar e Concluir';
          } else {
            btn.textContent = 'Verificar e Continuar';
          }

          // Mudamos o comportamento do botão para validar primeiro
          btn.onclick = async () => {
             $('err-lesson').textContent = '';
             const ans = answerInput.value.trim();
             if(!ans) {
                 $('err-lesson').textContent = 'Você precisa escrever uma resposta!';
                 return;
             }

             try {
                 btn.textContent = 'Avaliando...';
                 btn.disabled = true;

                 const evaluation = await post(`/api/tarefas/${state.userId}/avaliar-resposta`, {
                     tema: state.lessonActive.tema,
                     enunciado: exercicios[exIdx],
                     resposta: ans
                 });

                 // Mostra feedback da IA
                 const feedbackDiv = document.createElement('div');
                 feedbackDiv.id = 'lesson-feedback';
                 feedbackDiv.style.marginTop = '15px';
                 feedbackDiv.style.padding = '15px';
                 feedbackDiv.style.borderRadius = '12px';
                 feedbackDiv.style.fontWeight = 'bold';
                 feedbackDiv.style.backgroundColor = evaluation.correto ? '#dcfce7' : '#fef2f2';
                 feedbackDiv.style.color = evaluation.correto ? '#166534' : '#991b1b';

                 let extraHtml = '';
                 if (!evaluation.correto) {
                    extraHtml = `<div style="margin-top: 15px;"><button id="btn-try-again" style="background: transparent; border: 1px solid #991b1b; color: #991b1b; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 700;">Tentar Novamente</button></div>`;
                 }

                 feedbackDiv.innerHTML = `<div>${evaluation.correto ? '✅ Muito Bem!' : '❌ Ops!'}</div><div style="font-weight:normal; margin-top:5px;">${evaluation.feedback}</div>${extraHtml}`;

                 contentDiv.appendChild(feedbackDiv);

                 if(evaluation.correto) {
                     btn.textContent = isLastEx ? 'Concluir' : 'Continuar';
                     btn.disabled = false;
                     btn.onclick = advanceLessonFlow;
                 } else {
                     // Permite avançar mesmo errando
                     btn.textContent = isLastEx ? 'Concluir Mesmo Assim' : 'Continuar Mesmo Assim';
                     btn.disabled = false;
                     btn.onclick = advanceLessonFlow;

                     // Se quiser tentar de novo
                     const btnTryAgain = document.getElementById('btn-try-again');
                     if (btnTryAgain) {
                         btnTryAgain.onclick = () => {
                             feedbackDiv.remove();
                             renderLessonStep();
                         };
                     }
                 }
             } catch(e) {
                 $('err-lesson').textContent = e.message;
                 btn.textContent = 'Verificar Novamente';
                 btn.disabled = false;
             }
          };

          // Pula a função onclick de avanço padrão, usando a nossa acima para o step de exercício
          return;
        }

        btn.onclick = advanceLessonFlow;
      }

      async function advanceLessonFlow() {
          const exerciciosCount = (state.lessonActive.conteudo.exercicios || []).length;
          const actualTotalSteps = 2 + exerciciosCount;
          const btn = $('btn-lesson-action');
          $('err-lesson').textContent = '';

          const isLastStep = state.lessonActive.tipo === 'teoria' ? state.lessonStep >= 1 : state.lessonStep >= actualTotalSteps - 1;

          if (isLastStep) {
              try {
                btn.textContent = 'Concluindo...'; btn.disabled = true;
                const data = await post(`/api/tarefas/${state.userId}/concluir`, { taskId: state.lessonActive.id });
                state.tarefas = data.tarefas;
                $('journey-msg').textContent = data.feedback || 'Muito bem! Lição concluída!';
                buildJourney();
                hideAllScreens();
                $('screen-journey').classList.remove('hidden');
              } catch(e) {
                $('err-lesson').textContent = e.message;
              } finally {
                btn.textContent = 'Continuar'; btn.disabled = false;
              }
          } else {
              state.lessonStep++;
              renderLessonStep();
          }
      }

    </script>
  </body>
</html>
