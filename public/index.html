<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amigo de Estudo</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='50'%3E%F0%9F%A4%96%3C/text%3E%3C/svg%3E" />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
      mermaid.initialize({ startOnLoad: false, theme: 'default' });
      window.mermaid = mermaid;
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
      window.MathJax = {
        tex: {
          inlineMath: [['$', '$'], ['\\(', '\\)']],
          displayMath: [['$$', '$$'], ['\\[', '\\]'], ['[', ']']]
        },
        startup: {
          typeset: false
        }
      };
    </script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap");

      :root {
        --bg-dark: #0A0A0F;
        --bg-card: rgba(20, 20, 30, 0.6);
        --text-main: #E2E8F0;
        --text-muted: #94A3B8;
        --primary: #8B5CF6;
        --primary-glow: rgba(139, 92, 246, 0.5);
        --secondary: #3B82F6;
        --secondary-glow: rgba(59, 130, 246, 0.5);
        --success: #10B981;
        --success-glow: rgba(16, 185, 129, 0.5);
        --error: #EF4444;
        --border-glass: rgba(255, 255, 255, 0.08);
        --border-glass-hover: rgba(255, 255, 255, 0.15);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        background: var(--bg-dark);
        color: var(--text-main);
        display: flex;
        justify-content: center;
        min-height: 100vh;
        background-image:
          radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 35%),
          radial-gradient(circle at 85% 30%, rgba(59, 130, 246, 0.15), transparent 35%),
          url("data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPgo8cmVjdCB3aWR0aD0iNCIgaGVpZ2h0PSI0IiBmaWxsPSIjMGEwYTBmIi8+CjxyZWN0IHdpZHRoPSIxIiBoZWlnaHQ9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz4KPC9zdmc+");
        background-attachment: fixed;
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

      .app-container {
        width: 100%;
        max-width: 520px;
        background: rgba(10, 10, 15, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        padding: 0;
        position: relative;
        border-left: 1px solid var(--border-glass);
        border-right: 1px solid var(--border-glass);
        box-shadow: 0 0 80px rgba(0, 0, 0, 0.8);
      }

      .header-glass {
        padding: 20px;
        background: rgba(10, 10, 15, 0.8);
        border-bottom: 1px solid var(--border-glass);
        backdrop-filter: blur(10px);
        position: sticky;
        top: 0;
        z-index: 100;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .user-stats {
        display: flex;
        gap: 15px;
        align-items: center;
      }

      .stat-badge {
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(255,255,255,0.05);
        padding: 6px 12px;
        border-radius: 20px;
        border: 1px solid var(--border-glass);
        font-weight: 700;
        font-size: 14px;
      }
      .stat-badge.xp { color: var(--primary); box-shadow: 0 0 10px rgba(139,92,246,0.2); }
      .stat-badge.streak { color: #F59E0B; box-shadow: 0 0 10px rgba(245,158,11,0.2); }
      .stat-badge.level { color: var(--secondary); }

      .content-area {
        padding: 24px;
        flex: 1;
        display: flex;
        flex-direction: column;
      }

      h1, h2, h3 { margin-top: 0; font-weight: 900; letter-spacing: -0.5px; }

      .hidden { display: none !important; }

      input, textarea {
        width: 100%;
        font-family: "Inter", sans-serif;
        font-size: 16px;
        padding: 16px;
        border: 1px solid var(--border-glass);
        border-radius: 16px;
        background: rgba(0, 0, 0, 0.3);
        color: #fff;
        margin-bottom: 20px;
        outline: none;
        transition: all 0.3s ease;
      }
      input::placeholder, textarea::placeholder { color: var(--text-muted); }
      input:focus, textarea:focus {
        border-color: var(--primary);
        box-shadow: 0 0 0 4px var(--primary-glow);
        background: rgba(139, 92, 246, 0.05);
      }
      label { font-weight: 700; font-size: 16px; display: block; margin-bottom: 10px; color: var(--text-muted); }

      .btn {
        width: 100%;
        font-family: "Inter", sans-serif;
        font-weight: 800;
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 1px;
        padding: 16px;
        border-radius: 16px;
        border: none;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        display: inline-flex;
        justify-content: center;
        align-items: center;
        margin-bottom: 16px;
        user-select: none;
        position: relative;
        overflow: hidden;
      }

      .btn::after {
        content: "";
        position: absolute;
        top: 0; left: -100%;
        width: 50%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        transform: skewX(-20deg);
      }
      .btn:hover::after { left: 150%; transition: 0.7s; }

      .btn:active { transform: scale(0.97); }

      .btn-primary {
        background: linear-gradient(135deg, var(--primary), #6D28D9);
        color: white;
        box-shadow: 0 8px 25px var(--primary-glow);
      }
      .btn-primary:hover { box-shadow: 0 12px 30px var(--primary-glow); }

      .btn-secondary {
        background: linear-gradient(135deg, var(--secondary), #2563EB);
        color: white;
        box-shadow: 0 8px 25px var(--secondary-glow);
      }

      .btn-outline {
        background: rgba(255,255,255,0.03);
        color: var(--text-main);
        border: 1px solid var(--border-glass);
      }
      .btn-outline:hover { background: rgba(255,255,255,0.08); border-color: var(--border-glass-hover); }

      .screen {
        flex: 1;
        display: flex;
        flex-direction: column;
        animation: fadeScaleIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes fadeScaleIn {
        0% { opacity: 0; transform: scale(0.96) translateY(10px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }

      .journey-header {
        text-align: center;
        padding: 0 0 30px 0;
        margin-bottom: 30px;
      }

      .journey-header h2 {
        font-size: 28px;
        background: linear-gradient(135deg, #fff, #94A3B8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 8px;
      }
      .journey-header p { font-size: 15px; color: var(--text-muted); margin: 0; font-weight: 500; }

      .path-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        padding-bottom: 100px;
      }

      .path-item {
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .task-node {
        width: 72px;
        height: 72px;
        border-radius: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 24px;
        font-weight: 900;
        color: white;
        cursor: pointer;
        position: relative;
        z-index: 2;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        background: var(--bg-card);
        border: 1px solid var(--border-glass);
      }

      .task-node::before {
        content: ""; position: absolute; inset: -2px; border-radius: 26px; z-index: -1;
        background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
        opacity: 0; transition: 0.3s;
      }

      .task-node:hover { transform: translateY(-4px) scale(1.05); }
      .task-node:hover::before { opacity: 1; }

      .task-node.locked {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .task-node.active {
        background: linear-gradient(135deg, var(--primary), #6D28D9);
        border: none;
        box-shadow: 0 0 30px var(--primary-glow), inset 0 0 20px rgba(255,255,255,0.2);
        animation: pulseGlow 2s infinite alternate;
      }

      @keyframes pulseGlow {
        0% { box-shadow: 0 0 20px var(--primary-glow), inset 0 0 10px rgba(255,255,255,0.1); }
        100% { box-shadow: 0 0 40px var(--primary-glow), inset 0 0 20px rgba(255,255,255,0.3); }
      }

      .task-node.done {
        background: linear-gradient(135deg, var(--success), #059669);
        border: none;
        box-shadow: 0 0 20px var(--success-glow);
      }

      .task-label {
        margin-top: 16px;
        margin-bottom: 4px;
        font-size: 15px;
        font-weight: 700;
        text-align: center;
        width: 280px;
        color: #fff;
        z-index: 2;
        background: rgba(0,0,0,0.4);
        padding: 10px 16px;
        border-radius: 12px;
        border: 1px solid var(--border-glass);
        backdrop-filter: blur(10px);
      }

      .path-line {
        width: 2px;
        height: 40px;
        background: linear-gradient(180deg, var(--primary-glow), transparent);
        z-index: 1;
        margin: 4px 0;
      }

      .path-line.done {
        background: var(--success);
        box-shadow: 0 0 10px var(--success-glow);
      }
      .path-line.locked { background: var(--border-glass); }

      .lesson-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        background: rgba(0,0,0,0.2);
        padding: 16px;
        border-radius: 20px;
        border: 1px solid var(--border-glass);
      }
      .progress-bar-container {
        flex: 1;
        height: 8px;
        background: rgba(255,255,255,0.05);
        border-radius: 10px;
        margin: 0 20px;
        overflow: hidden;
        position: relative;
      }
      .progress-bar {
        height: 100%;
        background: linear-gradient(90deg, var(--primary), var(--secondary));
        width: 0%;
        transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 0 10px var(--primary-glow);
      }
      .close-lesson {
        width: 36px; height: 36px;
        display: flex; justify-content: center; align-items: center;
        background: rgba(255,255,255,0.05);
        border-radius: 50%;
        color: var(--text-muted);
        cursor: pointer;
        font-weight: bold;
        transition: 0.2s;
      }
      .close-lesson:hover { background: rgba(255,255,255,0.1); color: #fff; }

      .lesson-card {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        animation: slideUpFade 0.5s ease forwards;
      }

      @keyframes slideUpFade {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .lesson-character {
        font-size: 48px;
        margin-bottom: 15px;
        display: inline-flex;
        padding: 15px;
        background: rgba(139, 92, 246, 0.1);
        border-radius: 20px;
        border: 1px solid rgba(139, 92, 246, 0.2);
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.1);
        align-self: flex-start;
      }

      .lesson-bubble {
        background: var(--bg-card);
        border: 1px solid var(--border-glass);
        border-radius: 24px;
        border-top-left-radius: 4px;
        padding: 24px;
        font-size: 16px;
        line-height: 1.6;
        position: relative;
        margin-bottom: 30px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        backdrop-filter: blur(10px);
      }

      .lesson-badge {
        display: inline-block;
        background: rgba(139, 92, 246, 0.15);
        border: 1px solid rgba(139, 92, 246, 0.3);
        color: #C4B5FD;
        padding: 6px 14px;
        border-radius: 12px;
        font-size: 12px;
        text-transform: uppercase;
        font-weight: 800;
        margin-bottom: 16px;
        letter-spacing: 1px;
      }

      #lesson-feed {
        overflow-y: auto;
        flex: 1;
        padding-right: 8px;
        scroll-behavior: smooth;
      }

      .lesson-content-inner {
        color: #F8FAFC;
      }

      .lesson-content-inner textarea {
        background: rgba(0,0,0,0.4);
        color: #fff;
        border: 1px solid rgba(255,255,255,0.1);
      }

      .exercise-area { margin-top: 20px; }

      .exercise-feedback {
        margin-top: 15px;
        padding: 16px;
        border-radius: 16px;
        font-weight: 500;
        animation: fadeScaleIn 0.3s ease;
      }

      .bottom-bar {
        margin-top: auto;
        padding-top: 20px;
        position: sticky;
        bottom: 0;
        background: linear-gradient(0deg, var(--bg-dark) 40%, transparent);
        padding-bottom: 20px;
      }

      .error-msg {
        color: var(--error);
        font-weight: 600;
        text-align: center;
        margin-bottom: 16px;
        background: rgba(239, 68, 68, 0.1);
        padding: 10px;
        border-radius: 10px;
        border: 1px solid rgba(239, 68, 68, 0.2);
        display: none;
      }
      .error-msg:not(:empty) { display: block; }

      .markdown-body {
        font-family: inherit;
        line-height: 1.7;
        color: #E2E8F0;
      }
      .markdown-body h1, .markdown-body h2, .markdown-body h3 {
        margin-top: 1.5em; margin-bottom: 0.8em; color: #fff;
      }
      .markdown-body p { margin-bottom: 1.2em; }
      .markdown-body ul, .markdown-body ol { margin-bottom: 1.2em; padding-left: 1.5em; }
      .markdown-body li { margin-bottom: 0.5em; }
      .markdown-body strong { font-weight: 700; color: var(--primary); }
      .markdown-body em { color: var(--secondary); font-style: normal; font-weight: 500; }
      .markdown-body pre { background: rgba(0,0,0,0.5); padding: 16px; border-radius: 12px; border: 1px solid var(--border-glass); overflow-x: auto; }
      .markdown-body code { font-family: "JetBrains Mono", monospace; font-size: 14px; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 6px; }

      .xp-popup {
        position: fixed;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(139, 92, 246, 0.9);
        color: white;
        padding: 20px 40px;
        border-radius: 30px;
        font-size: 24px;
        font-weight: 900;
        box-shadow: 0 0 50px var(--primary-glow);
        z-index: 1000;
        pointer-events: none;
        animation: xpFloat 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }

      @keyframes xpFloat {
        0% { opacity: 0; transform: translate(-50%, -30%) scale(0.5); }
        20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        80% { opacity: 1; transform: translate(-50%, -60%) scale(1); }
        100% { opacity: 0; transform: translate(-50%, -100%) scale(0.8); }
      }
    </style>


  </head>
  <body>
    <div class="app-container">

      <!-- STATUS HEADER (Gamificação) -->
      <div id="header-status" class="header-glass hidden">
        <div style="font-weight: 900; color: #fff; font-size: 18px; letter-spacing: -0.5px;">Elite <span style="color: var(--primary);">AI</span></div>
        <div class="user-stats">
          <div class="stat-badge xp" title="Experiência (XP)"><span id="ui-xp">0</span> XP</div>
          <div class="stat-badge level" title="Seu Nível Atual">LVL <span id="ui-level">1</span></div>
          <div class="stat-badge streak" title="Dias Seguidos">🔥 <span id="ui-streak">0</span></div>
        </div>
      </div>

      <!-- ONBOARDING SCREENS -->
      <div id="screen-onboarding" class="screen">
        <div style="text-align: center; margin-top: 40px; margin-bottom: 40px;">
          <div style="font-size: 80px; margin-bottom: 10px;">🤖</div>
          <h1 style="color: #fff; font-size: 32px; font-weight: 900; letter-spacing: -1px;">Amigo <span style="color: var(--primary);">Elite</span></h1>
          <p style="color: var(--text-muted); font-weight: 500; font-size: 16px;">Mentoria Socrática. Aprenda pensando.</p>
        </div>

        <div id="onb-step-1">
          <label for="in-objetivo">Qual o seu objetivo principal?</label>
          <input id="in-objetivo" type="text" placeholder="Ex: Enem, Prova de Matemática..." />
          <p id="err-onb-1" class="error-msg"></p>
          <div class="bottom-bar">
            <button id="btn-next-1" class="btn btn-primary">Continuar</button>
          </div>
        </div>

        <div id="onb-step-2-escola" class="hidden">
          <label for="in-assuntos">Quais assuntos vão cair na prova?</label>
          <textarea id="in-assuntos" rows="3" placeholder="Ex: Frações, interpretação de texto..."></textarea>
          <p id="err-onb-escola" class="error-msg"></p>
          <div class="bottom-bar">
            <button id="btn-next-escola" class="btn btn-primary">Gerar Trilha</button>
            <button id="btn-generic-escola" class="btn btn-outline">Testar Trilha Genérica</button>
          </div>
        </div>

        <div id="onb-step-2-concurso" class="hidden">
          <label>Você tem o conteúdo do edital?</label>
          <p id="err-onb-conc-1" class="error-msg"></p>
          <div class="bottom-bar">
            <button id="btn-edital-sim" class="btn btn-primary">Sim, eu tenho</button>
            <button id="btn-edital-nao" class="btn btn-outline">Não tenho</button>
          </div>
        </div>

        <div id="onb-step-3-concurso" class="hidden">
          <label for="in-materias">Cole aqui as matérias principais:</label>
          <textarea id="in-materias" rows="3" placeholder="Ex: Português, Direito Administrativo..."></textarea>
          <p id="err-onb-conc-2" class="error-msg"></p>
          <div class="bottom-bar">
            <button id="btn-next-concurso" class="btn btn-primary">Gerar Trilha</button>
          </div>
        </div>

        <!-- Loading State -->
        <div id="onb-loading" class="hidden" style="text-align: center; margin-top: 50px;">
          <div style="font-size: 50px; animation: bounce 1s infinite;">🧠</div>
          <h2 style="margin-top: 20px; color: var(--secondary);">Montando sua trilha...</h2>
        </div>
      </div>

      <!-- JOURNEY / PATH SCREEN -->
      <div id="screen-journey" class="screen hidden">
        <div class="journey-header">
          <h2 id="journey-title">Sua Trilha Diária</h2>
          <p id="journey-msg">Complete os desafios na ordem.</p>
        </div>

        <div id="path-container" class="path-container">
          <!-- Nodes will be injected here -->
        </div>
      </div>

      <!-- LESSON SCREEN -->
      <div id="screen-lesson" class="screen hidden">
        <div class="lesson-header">
          <div id="btn-close-lesson" class="close-lesson">✕</div>
          <div class="progress-bar-container">
            <div id="lesson-progress" class="progress-bar"></div>
          </div>
        </div>

        <div class="lesson-card">
          <div id="lesson-feed"></div>
        </div>

        <p id="err-lesson" class="error-msg"></p>
        <div class="bottom-bar">
          <button id="btn-lesson-action" class="btn btn-primary">Continuar</button>
        </div>
      </div>

    </div>

    <script>
      // State Management
      const state = {
        userId: localStorage.getItem('amigo_user_id') || `u-${Date.now()}`,
        objetivo: '',
        tipo: 'escola',
        tarefas: [],
        lessonActive: null,
        lessonStep: 0,
        xp: parseInt(localStorage.getItem('amigo_xp') || 0),
        level: parseInt(localStorage.getItem('amigo_level') || 1),
        streak: parseInt(localStorage.getItem('amigo_streak') || 0)
      };
      localStorage.setItem('amigo_user_id', state.userId);

      // Utility Functions
      const $ = (id) => document.getElementById(id);
      const hideAllScreens = () => document.querySelectorAll('.screen').forEach(el => el.classList.add('hidden'));
      const hideAllOnbSteps = () => document.querySelectorAll('[id^="onb-step"]').forEach(el => el.classList.add('hidden'));

      async function post(url, payload) {
        const res = await fetch(url, { method: 'POST', headers: { 'content-type':'application/json' }, body: JSON.stringify(payload) });
        const data = await res.json();
        if (!res.ok) throw new Error(data.erro || 'Erro no servidor');
        return data;
      }

      // ----------------------------------------------------------------------
      // ONBOARDING LOGIC
      // ----------------------------------------------------------------------
      $('btn-next-1').onclick = async () => {
        $('err-onb-1').textContent = '';
        state.objetivo = $('in-objetivo').value.trim();
        if (!state.objetivo) return $('err-onb-1').textContent = 'Digite o que você quer estudar!';

        try {
          const btn = $('btn-next-1');
          btn.textContent = '...'; btn.disabled = true;
          const data = await post('/api/onboarding/detectar-tipo', { objetivo: state.objetivo });
          state.tipo = data.tipo;

          hideAllOnbSteps();
          if (state.tipo === 'concurso') $('onb-step-2-concurso').classList.remove('hidden');
          else $('onb-step-2-escola').classList.remove('hidden');

        } catch(e) { $('err-onb-1').textContent = e.message; }
        finally { $('btn-next-1').textContent = 'Continuar'; $('btn-next-1').disabled = false; }
      };

      // Concurso flow
      $('btn-edital-sim').onclick = () => {
        hideAllOnbSteps();
        $('onb-step-3-concurso').classList.remove('hidden');
      };
      $('btn-edital-nao').onclick = () => finalizarOnboarding({ aceitarGenerico: true, conteudo: '', temConteudo: 'nao' });
      $('btn-next-concurso').onclick = () => {
        const mat = $('in-materias').value.trim();
        if(!mat) return $('err-onb-conc-2').textContent = 'Preencha as matérias!';
        finalizarOnboarding({ conteudo: mat, temConteudo: 'sim' });
      };

      // Escola flow
      $('btn-next-escola').onclick = () => {
        const ass = $('in-assuntos').value.trim();
        if(!ass) return $('err-onb-escola').textContent = 'Preencha os assuntos!';
        finalizarOnboarding({ conteudo: ass, aceitarGenerico: false });
      };
      $('btn-generic-escola').onclick = () => finalizarOnboarding({ conteudo: '', aceitarGenerico: true });

      async function fetchTodayTasks() {
         try {
             const res = await fetch(`/api/tarefas/${state.userId}/hoje`);
             if (res.ok) {
                 const data = await res.json();
                 if (data.tarefas && data.tarefas.length > 0) {
                     state.tarefas = data.tarefas;
                     if (data.user_status) {
                         state.xp = data.user_status.xp;
                         state.level = data.user_status.level;
                         state.streak = data.user_status.streak;
                         localStorage.setItem('amigo_xp', state.xp);
                         localStorage.setItem('amigo_level', state.level);
                         localStorage.setItem('amigo_streak', state.streak);
                     }
                     $('journey-msg').textContent = data.mensagem || 'Missões prontas para hoje.';
                     buildJourney();
                     hideAllScreens();
                     $('screen-journey').classList.remove('hidden');
                     return true;
                 }
             }
         } catch(e) { console.error("Sem tarefas prontas", e); }
         return false;
      }

      async function finalizarOnboarding(extra) {
        hideAllOnbSteps();
        $('onb-loading').classList.remove('hidden');

        try {
          const data = await post('/api/onboarding/finalizar', {
            userId: state.userId,
            objetivo: state.objetivo,
            tipo: state.tipo,
            ...extra
          });

          await fetchTodayTasks();
        } catch(e) {
          $('onb-loading').classList.add('hidden');
          $('onb-step-1').classList.remove('hidden');
          $('err-onb-1').textContent = e.message;
        }
      }

      // Auto-login on load se tem userId configurado e rotina de hoje pronta
      window.onload = async () => {
          if (state.userId && state.userId !== localStorage.getItem('amigo_user_id')) return; // first load

          const hasTasks = await fetchTodayTasks();
          // If no tasks, stay on onboarding screen
      };

      // ----------------------------------------------------------------------
      // JOURNEY (PATH) LOGIC
      // ----------------------------------------------------------------------
      function updateStatsUI() {
        $('ui-xp').textContent = state.xp;
        $('ui-level').textContent = state.level;
        $('ui-streak').textContent = state.streak;
      }

      function addXP(amount) {
        state.xp += amount;
        if (state.xp >= state.level * 100) {
          state.level++;
          showXPPopup(`Level Up! LVL ${state.level}`);
        } else {
          showXPPopup(`+${amount} XP`);
        }
        localStorage.setItem('amigo_xp', state.xp);
        localStorage.setItem('amigo_level', state.level);
        updateStatsUI();
      }

      function showXPPopup(text) {
        const popup = document.createElement('div');
        popup.className = 'xp-popup';
        popup.textContent = text;
        document.body.appendChild(popup);
        setTimeout(() => popup.remove(), 2000);
      }

      function buildJourney() {
        $('header-status').classList.remove('hidden');
        updateStatsUI();

        const container = $('path-container');
        container.innerHTML = '';

        let firstPendingFound = false;

        state.tarefas.forEach((task, idx) => {
          const isDone = task.status === 'concluida';
          let nodeClass = 'locked';
          let icon = '🔒';

          // FOR TESTING: UNLOCK ALL NODES
          if (isDone) {
            nodeClass = 'done';
            icon = '⭐';
          } else {
            nodeClass = 'active'; // Temporarily make all pending nodes active
            icon = '▶';
            firstPendingFound = true;
          }

          const wrapper = document.createElement('div');
          wrapper.style.display = 'flex';
          wrapper.style.flexDirection = 'column';
          wrapper.style.alignItems = 'center';

          const node = document.createElement('div');
          node.className = `task-node ${nodeClass}`;
          node.textContent = icon;

          // FOR TESTING: ALL NODES CLICKABLE
          node.onclick = () => startLesson(task);

          wrapper.appendChild(node);

          const label = document.createElement('div');
          label.className = 'task-label';

          let title = task.materia;
          let sub = task.descricao || task.tema;

          // Adiciona indicação clara de que é a Teoria ou Prática/Questões para evitar que o nó pareça duplicado
          let tipoStr = task.tipo === 'questoes' ? '(Prática)' : '(Teoria)';

          // Se o nome do tema e da materia sao parecidos/repetidos, mostra so um com enfase
          if (title.toLowerCase() === sub.toLowerCase() || sub.toLowerCase().startsWith(title.toLowerCase())) {
              label.innerHTML = `<span style="font-weight:800; color: #475569;">${sub} <span style="font-size: 12px; color: #94a3b8; font-weight: normal;">${tipoStr}</span></span>`;
          } else {
              label.innerHTML = `${title}<br><span style="font-weight:400; color: #64748b;">${sub} <span style="font-size: 12px; color: #94a3b8;">${tipoStr}</span></span>`;
          }

          wrapper.appendChild(label);

          if (idx < state.tarefas.length - 1) {
            const line = document.createElement('div');
            line.className = 'path-line';
            wrapper.appendChild(line);
          }

          container.appendChild(wrapper);
        });
      }

      // ----------------------------------------------------------------------
      // LESSON (AULA INTERATIVA) LOGIC
      // ----------------------------------------------------------------------
      function startLesson(task) {
        state.lessonActive = task;

        // Se a tarefa for de "questoes", pula a teoria e o exemplo e vai direto para o primeiro exercício (step 2)
        if (task.tipo === 'questoes') {
            state.lessonStep = 2;
        } else {
            // Se for de teoria, começa na explicação (step 0)
            state.lessonStep = 0;
        }

        hideAllScreens();
        $('screen-lesson').classList.remove('hidden');
        $('lesson-feed').innerHTML = ''; // Limpa aula anterior
        $('btn-lesson-action').classList.add('hidden'); // Esconde concluir
        $('lesson-progress').style.width = '0%';

        renderLessonFlow();
      }

      $('btn-close-lesson').onclick = () => {
        if(confirm("Tem certeza que deseja sair? O progresso desta lição será perdido.")) {
          hideAllScreens();
          $('screen-journey').classList.remove('hidden');
        }
      };

      $('btn-lesson-action').onclick = async () => {
        // Fluxo linear usa botões dentro do feed de aula.
        return;
      };


      async function renderMarkdown(targetDiv, mdText) {
          const safeText = (mdText || '').toString().trim() || 'Conteúdo indisponível para este bloco.';
          targetDiv.innerHTML = `<div class="markdown-body">${marked.parse(safeText)}</div>`;
          if (window.MathJax) {
            await MathJax.typesetPromise([targetDiv]);
          }
          if (window.mermaid) {
            const mermaidDivs = targetDiv.querySelectorAll('.language-mermaid');
            for (let i = 0; i < mermaidDivs.length; i++) {
              const el = mermaidDivs[i];
              const p = document.createElement('div');
              p.className = 'mermaid';
              p.textContent = el.textContent;
              el.parentNode.replaceWith(p);
            }
            await window.mermaid.run({ nodes: targetDiv.querySelectorAll('.mermaid') }).catch(e => console.error(e));
          }
      }

      function buildChart(canvasId, visualData) {
          const ctx = document.getElementById(canvasId).getContext('2d');
          const dados = visualData.dados || {};
          let xVals = Array.isArray(dados.x) ? dados.x.map(Number).filter(Number.isFinite) : [];
          let yVals = Array.isArray(dados.y) ? dados.y.map(Number).filter(Number.isFinite) : [];

          if (!xVals.length || !yVals.length || xVals.length !== yVals.length) {
              xVals = [-2, -1, 0, 1, 2];
              yVals = [-3, -1, 1, 3, 5];
          }

          const pontos = xVals.map((x, i) => ({ x, y: yVals[i] }));
          const intercepto = pontos.find(p => p.x === 0) || null;
          const minX = Math.min(...xVals) - 1;
          const maxX = Math.max(...xVals) + 1;

          new Chart(ctx, {
              type: 'scatter',
              data: {
                  datasets: [
                    {
                      type: 'line',
                      label: visualData.funcao || 'Reta da função',
                      data: pontos,
                      parsing: false,
                      borderColor: '#2563eb',
                      backgroundColor: 'rgba(37, 99, 235, 0.15)',
                      borderWidth: 3,
                      pointRadius: 4,
                      pointHoverRadius: 6,
                      tension: 0
                    },
                    intercepto ? {
                      type: 'scatter',
                      label: 'Intercepto em y',
                      data: [intercepto],
                      parsing: false,
                      borderColor: '#f97316',
                      backgroundColor: '#f97316',
                      pointRadius: 7
                    } : null,
                    {
                      type: 'line',
                      label: 'eixo x',
                      data: [{x: minX, y: 0}, {x: maxX, y: 0}],
                      parsing: false,
                      borderColor: 'rgba(100, 116, 139, 0.5)',
                      borderWidth: 1.5,
                      pointRadius: 0
                    }
                  ].filter(Boolean)
              },
              options: {
                  responsive: true,
                  maintainAspectRatio: true,
                  plugins: {
                      legend: { labels: { color: '#334155', font: { weight: '700' } } },
                      tooltip: {
                        callbacks: {
                          label: (ctx) => `x=${ctx.raw.x}, y=${ctx.raw.y}`
                        }
                      }
                  },
                  scales: {
                      x: {
                        type: 'linear',
                        title: { display: true, text: 'Eixo x', color: '#334155', font: { weight: '700' } },
                        ticks: { color: '#64748b', maxTicksLimit: 8 },
                        grid: { color: 'rgba(100,116,139,0.2)' }
                      },
                      y: {
                        title: { display: true, text: 'Eixo y', color: '#334155', font: { weight: '700' } },
                        ticks: { color: '#64748b', maxTicksLimit: 7 },
                        grid: { color: 'rgba(100,116,139,0.2)' }
                      }
                  }
              }
          });
      }

      function createLessonBlockHTML(title, emoji) {
          const card = document.createElement('div');
          card.className = 'lesson-card';

          const char = document.createElement('div');
          char.className = 'lesson-character';
          char.textContent = emoji;

          const bubble = document.createElement('div');
          bubble.className = 'lesson-bubble';

          const badge = document.createElement('div');
          badge.className = 'lesson-badge';
          badge.textContent = title;

          const content = document.createElement('div');
          content.className = 'lesson-content-inner';

          bubble.appendChild(badge);
          bubble.appendChild(content);
          card.appendChild(char);
          card.appendChild(bubble);

          return { card, content };
      }

      function getVisualTitle(blocoVisual) {
          const desc = (blocoVisual?.descricao || '').toLowerCase();
          if (desc.includes('apoio') || desc.includes('interpretar')) return 'Mapa Visual da Aula';
          if (desc.includes('compar')) return 'Comparação Visual';
          return 'Visual Essencial';
      }

      async function renderLessonFlow() {
          const task = state.lessonActive;
          const blocos = task.conteudo.blocos || [];
          const totalBlocos = blocos.length;

          if (state.lessonStep >= totalBlocos) {
             // Terminou os blocos, mostrar botão de concluir
             const btnConcluir = $('btn-lesson-action');
             btnConcluir.classList.remove('hidden');
             btnConcluir.onclick = async () => {
                 btnConcluir.textContent = 'Extraindo XP...';
                 btnConcluir.disabled = true;
                 try {
                     const data = await post(`/api/tarefas/${state.userId}/concluir`, { taskId: task.id });
                     state.tarefas = data.tarefas;
                     $('journey-msg').textContent = data.feedback || 'Muito bem! Missão concluída!';

                     // Conceder XP por concluir a lição (Backend já retorna o XP atualizado, vamos sincar)
                     if (data.xp !== undefined) {
                         const gained = data.xp - state.xp;
                         if (gained > 0) addXP(gained); // Só pra usar a animação
                     } else {
                         addXP(50); // Fallback caso backend nao retorne
                     }

                     buildJourney();
                     hideAllScreens();
                     $('screen-journey').classList.remove('hidden');
                 } catch(e) {
                     $('err-lesson').textContent = e.message;
                 } finally {
                     btnConcluir.textContent = 'Concluir Missão';
                     btnConcluir.disabled = false;
                 }
             };
             return;
          }

          // Atualizar barra de progresso
          const progPct = ((state.lessonStep) / totalBlocos) * 100;
          $('lesson-progress').style.width = `${progPct}%`;

          const bloco = blocos[state.lessonStep];
          const feed = $('lesson-feed');

          let requiresInteraction = false;

          if (bloco.tipo === 'explicacao') {
             const { card, content } = createLessonBlockHTML('Conceito Novo', '🤖');
             feed.appendChild(card);
             await renderMarkdown(content, bloco.conteudo);
          }
          else if (bloco.tipo === 'visual' && bloco.visual && bloco.visual.tipo !== 'nenhum') {
             const { card, content } = createLessonBlockHTML(getVisualTitle(bloco.visual), '📊');
             const vDiv = document.createElement('div');
             vDiv.className = 'visual-container';

             if (bloco.visual.descricao) {
                 const desc = document.createElement('div');
                 desc.style.marginBottom = '10px';
                 desc.style.color = '#64748b';
                 await renderMarkdown(desc, bloco.visual.descricao);
                 vDiv.appendChild(desc);
             }

             if (bloco.visual.tipo === 'diagrama') {
                 const info = document.createElement('div');
                 info.style.padding = '12px';
                 info.style.borderRadius = '10px';
                 info.style.background = 'rgba(125, 76, 219, 0.08)';
                 info.style.color = '#334155';
                 info.textContent = 'Visual conceitual: foque na interpretação da inclinação e do intercepto.';
                 content.appendChild(vDiv);
                 content.appendChild(info);
                 feed.appendChild(card);
             }
             else if (bloco.visual.tipo === 'tabela' && bloco.visual.dados && bloco.visual.dados.labels && bloco.visual.dados.valores) {
                 // Renderizar tabela HTML ao invez de chartjs de barra, pra ficar melhor
                 let tableHtml = '<table style="width:100%; text-align:left; color:#334155; border-collapse: separate; border-spacing: 0; margin-top: 10px; border:1px solid #dbe4ff; border-radius: 10px; overflow:hidden;">';
                 tableHtml += '<tr>';
                 bloco.visual.dados.labels.forEach(l => {
                     tableHtml += `<th style="background:#eef2ff; border-bottom:1px solid #dbe4ff; padding:10px; font-weight:800; color:#1e293b;">${l}</th>`;
                 });
                 tableHtml += '</tr>';
                 bloco.visual.dados.valores.forEach(row => {
                     tableHtml += '<tr>';
                     row.forEach(cell => {
                         tableHtml += `<td style="border-bottom:1px solid #e2e8f0; padding:10px; color:#334155;">${cell}</td>`;
                     });
                     tableHtml += '</tr>';
                 });
                 tableHtml += '</table>';
                 vDiv.innerHTML += tableHtml;
                 content.appendChild(vDiv);
                 feed.appendChild(card);
             } else {
                 const canvasId = `chart-${state.lessonStep}`;
                 vDiv.innerHTML += `<canvas id="${canvasId}" style="max-height:260px;"></canvas>`;
                 content.appendChild(vDiv);
                 feed.appendChild(card);

                 // Aguarda o DOM renderizar o canvas antes de montar o chart
                 setTimeout(() => {
                     buildChart(canvasId, bloco.visual);
                 }, 100);
             }
          }
          else if (bloco.tipo === 'exemplo') {
             const { card, content } = createLessonBlockHTML('Exemplo Prático', '💡');
             feed.appendChild(card);
             await renderMarkdown(content, bloco.conteudo);
          }
          else if (bloco.tipo === 'exercicios' || bloco.tipo === 'exercicio') {
             requiresInteraction = true;

             // Lida tanto com lista de perguntas quanto pergunta unica
             const perguntas = bloco.perguntas || (bloco.lista ? bloco.lista : [bloco.pergunta]);

             // Para simplificar no feed linear, vamos renderizar todas as perguntas desse bloco num unico card,
             // mas exigindo resposta em cada uma.

             for (let i = 0; i < perguntas.length; i++) {
                 const p = perguntas[i];
                 const { card, content } = createLessonBlockHTML(`Exercício`, '✍️');

                 const qText = document.createElement('div');
                 await renderMarkdown(qText, p);
                 content.appendChild(qText);

                 const exArea = document.createElement('div');
                 exArea.className = 'exercise-area';

                 const textarea = document.createElement('textarea');
                 textarea.rows = 3;
                 textarea.placeholder = "Escreva sua resposta aqui...";

                 const btnVerificar = document.createElement('button');
                 btnVerificar.textContent = "Verificar Resposta";

                 const btnPular = document.createElement('button');
                 btnPular.textContent = "Pular questão";
                 btnPular.style.marginLeft = '8px';
                 btnPular.style.background = 'linear-gradient(135deg, #64748b, #475569)';

                 const feedbackDiv = document.createElement('div');
                 feedbackDiv.className = 'exercise-feedback hidden';

                 btnVerificar.onclick = async () => {
                     const ans = textarea.value.trim();
                     if(!ans) return;

                     btnVerificar.disabled = true;
                     btnVerificar.textContent = "Avaliando...";
                     textarea.disabled = true;

                     try {
                         const evaluation = await post(`/api/tarefas/${state.userId}/avaliar-resposta`, {
                             tema: state.lessonActive.tema,
                             enunciado: p,
                             resposta: ans
                         });

                         feedbackDiv.classList.remove('hidden');
                         feedbackDiv.style.backgroundColor = evaluation.correto ? 'rgba(16, 185, 129, 0.1)' : 'rgba(239, 68, 68, 0.1)';
                         feedbackDiv.style.color = evaluation.correto ? '#34D399' : '#F87171';
                         feedbackDiv.style.border = `1px solid ${evaluation.correto ? 'rgba(16, 185, 129, 0.3)' : 'rgba(239, 68, 68, 0.3)'}`;
                         feedbackDiv.innerHTML = `<div>${evaluation.correto ? '🔥 Excelente:' : '💡 Dica:'} ${evaluation.feedback}</div>`;

                         if (evaluation.correto) {
                             addXP(15);
                         }

                         btnVerificar.style.display = 'none'; // Esconde botão apos responder
                         btnPular.style.display = 'none';

                         // Se for o ultimo exercicio do bloco, avanca o bloco
                         if (i === perguntas.length - 1) {
                             const btnNext = document.createElement('button');
                             btnNext.className = 'btn btn-primary';
                             btnNext.textContent = "Continuar Missão";
                             btnNext.style.marginTop = "15px";
                             btnNext.onclick = () => {
                                 btnNext.style.display = 'none';
                                 state.lessonStep++;
                                 renderLessonFlow();
                             };
                             content.appendChild(btnNext);

                             // Rola a tela
                             setTimeout(() => btnNext.scrollIntoView({behavior: 'smooth', block: 'center'}), 100);
                         }

                     } catch(e) {
                         alert(e.message);
                         btnVerificar.disabled = false;
                         btnVerificar.textContent = "Verificar Resposta";
                         textarea.disabled = false;
                     }
                 };

                 btnPular.onclick = () => {
                     textarea.value = '';
                     textarea.disabled = true;
                     btnVerificar.style.display = 'none';
                     btnPular.style.display = 'none';

                     feedbackDiv.classList.remove('hidden');
                     feedbackDiv.style.backgroundColor = '#fff7ed';
                     feedbackDiv.style.color = '#9a3412';
                     feedbackDiv.innerHTML = '<div>⏭️ Questão pulada. Você pode revisar depois.</div>';

                     if (i === perguntas.length - 1) {
                         const btnNext = document.createElement('button');
                         btnNext.textContent = "Continuar";
                         btnNext.style.marginTop = "10px";
                         btnNext.onclick = () => {
                             btnNext.style.display = 'none';
                             state.lessonStep++;
                             renderLessonFlow();
                         };
                         content.appendChild(btnNext);
                     }
                 };

                 exArea.appendChild(textarea);
                 exArea.appendChild(btnVerificar);
                 exArea.appendChild(btnPular);
                 exArea.appendChild(feedbackDiv);
                 content.appendChild(exArea);

                 feed.appendChild(card);
             }
          }

          // Auto scroll para o novo bloco
          setTimeout(() => {
              const cards = feed.querySelectorAll('.lesson-card');
              if(cards.length > 0) {
                  cards[cards.length - 1].scrollIntoView({behavior: 'smooth', block: 'start'});
              }
          }, 100);

          // Se não requer interação travante (como exercícios), renderiza um botão de continuar genérico para avançar pro prox bloco
          if (!requiresInteraction) {
             const btnNext = document.createElement('button');
             btnNext.className = 'btn';
             btnNext.style.width = '100%';
             btnNext.style.marginBottom = '20px';
             btnNext.textContent = "Continuar Lendo";
             btnNext.onclick = () => {
                 btnNext.style.display = 'none'; // Some com ele mesmo
                 state.lessonStep++;
                 renderLessonFlow();
             };
             feed.appendChild(btnNext);
          }
      }

    </script>
  </body>
</html>
